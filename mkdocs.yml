site_name: OctoPwn WASM Documentation
plugins:
    - search
    - offline
theme: 
  name: material
  logo: images/OCTO_Character_Web_64px.svg
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - content.code.copy
    - content.code.select

extra_css:
  - stylesheets/extra.css
use_directory_urls: false
repo_url: https://github.com/octopwn/octopwn-wasm-documentation/
site_description: OctoPwn WASM Documentation
site_author: The OctoPwn Team
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
docs_dir: 'docs'
nav:
